<!DOCTYPE html>
<html>
<head>
<title>Budget List</title>
</head>

<body>

<h2>Budget List</h2>

<a href="/budget/set/">Add New Budget</a>
<table border="1">

<tr>
<th>Category</th>
<th>Month</th>
<th>Budget Limit</th>
<th>Action</th>
</tr>

{% for b in budgets %}

<tr>

<td>{{ b.category }}</td>
<td>{{ b.month }}</td>
<td>{{ b.budget_limit }}</td>

<td>

<a href="/budget/delete/{{ forloop.counter0 }}/">Delete</a>

</td>

</tr>

{% endfor %}

</table>

</body>
</html>
