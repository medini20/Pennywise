<!DOCTYPE html>
<html>

<head>
<title>Pennywise Budget</title>

<style>

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:#0b1437;
color:white;
}

/* SIDEBAR */

.sidebar{
position:fixed;
width:220px;
height:100vh;
background:#0f1b4a;
padding:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:40px;
}

.sidebar a{
display:block;
padding:12px;
color:white;
text-decoration:none;
border-radius:6px;
margin-bottom:10px;
}

.sidebar a:hover{
background:#1c2c6a;
}

/* MAIN */

.main{
margin-left:240px;
padding:40px;
}

/* CARD */

.budget-card{
background:#0f1f5c;
border-radius:12px;
padding:18px;
margin-bottom:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* LEFT SECTION */

.budget-left{
display:flex;
align-items:center;
gap:15px;
}

.icon{
width:40px;
height:40px;
border-radius:50%;
background:#1a2a6c;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

/* INFO */

.budget-info h3{
margin:0;
font-size:16px;
}

.progress{
background:#1c2d72;
height:6px;
border-radius:10px;
margin:10px 0;
width:500px;
}

.progress-bar{
height:6px;
background:#ffd54f;
border-radius:10px;
}

/* TEXT */

.budget-stats{
font-size:13px;
display:flex;
gap:15px;
}

.spent{
color:#ff6b6b;
}

.budget{
color:#9bbcff;
}

.remaining{
color:#00e676;
}

/* ACTION ICONS */

.actions a{
color:white;
margin-left:12px;
text-decoration:none;
font-size:16px;
}

/* BUTTON */

.add-btn{
background:#3a7cff;
border:none;
padding:12px 25px;
border-radius:25px;
color:white;
cursor:pointer;
margin-top:20px;
}

.add-btn:hover{
background:#2f66e0;
}

</style>
</head>


<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>PENNYWISE</h2>

<a href="#">Records</a>
<a href="#">Charts</a>
<a href="/budget/">Budget</a>
<a href="#">Alerts</a>
<a href="#">Profile</a>

</div>



<!-- MAIN -->

<div class="main">

<h2>Budget Dashboard</h2>


{% for b in budgets %}

<div class="budget-card">

<div class="budget-left">

<div class="icon">
🍴
</div>

<div class="budget-info">

<h3>{{ b.category }}</h3>

<div class="progress">

<div class="progress-bar" style="width:60%"></div>

</div>

<div class="budget-stats">

<span class="spent">Spent: ₹0</span>

<span class="budget">Budget: ₹{{ b.limit }}</span>

<span class="remaining">Remaining: ₹{{ b.limit }}</span>

</div>

</div>

</div>


<div class="actions">

<a href="{% url 'edit_budget' b.id %}">✏️</a>

<a href="{% url 'delete_budget' b.id %}">🗑️</a>

</div>

</div>

{% empty %}

<p>No budgets added yet</p>

{% endfor %}



<a href="/budget/set/">
<button class="add-btn">Add Budget</button>
</a>

</div>

</body>

</html>
